name: build

on:
  push:
  pull_request:

jobs:
  inspircd4:
    runs-on: ubuntu-latest

    steps:
      - name: Check out module
        uses: actions/checkout@v4
        with:
          path: module

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libpcre2-dev perl pkg-config

      - name: Check out InspIRCd
        uses: actions/checkout@v4
        with:
          repository: inspircd/inspircd
          ref: master
          path: inspircd

      - name: Build module
        run: |
          pwd
          find "$GITHUB_WORKSPACE" -maxdepth 3 -type f -name CMakeLists.txt -print
          test -f "$GITHUB_WORKSPACE/inspircd/CMakeLists.txt"
          "$GITHUB_WORKSPACE/module/build-inspircd.sh" "$GITHUB_WORKSPACE/inspircd"

      - name: Upload compiled module
        uses: actions/upload-artifact@v4
        with:
          name: m_clientinfo.so
          path: inspircd/build/modules/m_clientinfo.so
